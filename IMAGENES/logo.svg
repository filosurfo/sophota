<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" width="380" height="300">
  <defs>
    <radialGradient id="bowlGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#F5E6C8"/>
      <stop offset="100%" style="stop-color:#D4B896"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#2C181066"/>
    </filter>
    <style>
      @keyframes steam1 {
        0%   { transform: translate(0px, 0px); opacity: 0.55; }
        40%  { transform: translate(-3px, -22px); opacity: 0.7; }
        100% { transform: translate(2px, -48px); opacity: 0; }
      }
      @keyframes steam2 {
        0%   { transform: translate(0px, 0px); opacity: 0.5; }
        40%  { transform: translate(4px, -20px); opacity: 0.65; }
        100% { transform: translate(-2px, -45px); opacity: 0; }
      }
      @keyframes steam3 {
        0%   { transform: translate(0px, 0px); opacity: 0.45; }
        40%  { transform: translate(-2px, -18px); opacity: 0.6; }
        100% { transform: translate(3px, -42px); opacity: 0; }
      }
      .s1 { animation: steam1 2.2s ease-out infinite; transform-origin: 130px 130px; }
      .s2 { animation: steam2 2.6s ease-out infinite 0.5s; transform-origin: 190px 125px; }
      .s3 { animation: steam3 2.4s ease-out infinite 1s; transform-origin: 250px 130px; }
    </style>
  </defs>

  <!-- BOWL -->
  <!-- Sombra base -->
  <ellipse cx="190" cy="220" rx="92" ry="14" fill="#2C1810" opacity="0.18"/>
  <!-- Cuerpo del bowl -->
  <path d="M 100 168 Q 100 228 190 232 Q 280 228 280 168 Z" fill="url(#bowlGrad)" filter="url(#shadow)"/>
  <!-- Borde superior del bowl -->
  <ellipse cx="190" cy="168" rx="90" ry="15" fill="#F5E6C8"/>
  <ellipse cx="190" cy="168" rx="90" ry="15" fill="none" stroke="#C49A3C" stroke-width="2"/>
  <!-- Caldo -->
  <ellipse cx="190" cy="168" rx="85" ry="11" fill="#7B3A1A" opacity="0.55"/>
  <!-- Fideos -->
  <path d="M 140 166 Q 152 156 164 166 Q 176 176 188 166 Q 200 156 212 166 Q 224 176 236 166 Q 244 160 250 166"
        fill="none" stroke="#F5E6C8" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M 145 172 Q 157 163 169 172 Q 181 181 193 172 Q 205 163 217 172 Q 226 167 232 172"
        fill="none" stroke="#F5E6C8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Carne roja -->
  <ellipse cx="172" cy="165" rx="13" ry="5" fill="#C0392B" opacity="0.85" transform="rotate(-12,172,165)"/>
  <ellipse cx="212" cy="163" rx="11" ry="4" fill="#C0392B" opacity="0.75" transform="rotate(8,212,163)"/>
  <!-- Cebollita -->
  <line x1="190" y1="157" x2="187" y2="143" stroke="#4A7C4E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="195" y1="158" x2="198" y2="144" stroke="#4A7C4E" stroke-width="2" stroke-linecap="round"/>
  <!-- Chopsticks -->
  <line x1="270" y1="125" x2="295" y2="190" stroke="#D4B896" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="122" x2="303" y2="185" stroke="#D4B896" stroke-width="2.5" stroke-linecap="round"/>

  <!-- VAPOR ANIMADO -->
  <g class="s1">
    <path d="M 130 148 Q 124 133 130 118 Q 136 103 130 88"
          fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g class="s2">
    <path d="M 190 143 Q 184 126 190 109 Q 196 92 190 75"
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g class="s3">
    <path d="M 250 148 Q 256 133 250 118 Q 244 103 250 88"
          fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- TEXTO -->
  <text x="55"  y="265" font-family="Georgia, serif" font-size="54" font-weight="bold" fill="white" letter-spacing="1">So</text>
  <text x="113" y="265" font-family="Georgia, serif" font-size="54" font-weight="bold" fill="#C49A3C" letter-spacing="1">PHO</text>
  <text x="241" y="265" font-family="Georgia, serif" font-size="54" font-weight="bold" fill="white" letter-spacing="1">ta</text>
  <!-- Subtítulo -->
  <text x="190" y="288" font-family="Georgia, serif" font-size="12" fill="#D4B896" text-anchor="middle" letter-spacing="4">NOODLE SOUP</text>
  <!-- Líneas decorativas subtítulo -->
  <line x1="50"  y1="281" x2="100" y2="281" stroke="#C49A3C" stroke-width="1"/>
  <line x1="280" y1="281" x2="330" y2="281" stroke="#C49A3C" stroke-width="1"/>
</svg>
